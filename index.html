<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriceAI | 24/7 全自動零售定價策略系統</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4285f4;
            --secondary-color: #34a853;
            --dark-color: #202124;
            --light-bg: #f8f9fa;
            --accent-color: #d93025;
            --gold-color: #af9500;
        }

        body { font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; line-height: 1.6; color: var(--dark-color); margin: 0; scroll-behavior: smooth; }
        
        /* Navigation */
        nav { background: #fff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary-color); text-decoration: none; }
        .btn-deck { background: var(--primary-color); color: #fff; padding: 8px 18px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 14px; transition: 0.3s; }

        /* Hero & Video Section */
        .hero { padding: 60px 5%; text-align: center; background: linear-gradient(135deg, #fff 0%, #e8f0fe 100%); }
        .hero h1 { font-size: 2.8rem; margin-bottom: 20px; }
        .hero p { font-size: 1.2rem; color: #555; max-width: 800px; margin: 0 auto 40px; }
        .video-container { max-width: 750px; margin: 0 auto 50px; background: #000; border-radius: 15px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.15); border: 4px solid #fff; }
        video { width: 100%; display: block; }

        /* Comparison Section */
        .comparison-section { padding: 80px 5%; background: #fff; }
        .comp-table { width: 100%; max-width: 850px; margin: 0 auto; border-collapse: collapse; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-radius: 10px; overflow: hidden; }
        .comp-table th, .comp-table td { padding: 20px; text-align: center; border: 1px solid #eee; }
        .comp-table th { background: #f8f9fa; font-weight: bold; }
        .highlight-col { background: rgba(66, 133, 244, 0.05); font-weight: bold; color: var(--primary-color); }

        /* Pricing Section */
        .pricing-section { padding: 80px 5%; background: var(--light-bg); }
        .pricing-grid { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; max-width: 1200px; margin: 0 auto; }
        .card { background: #fff; border: 1px solid #ddd; border-radius: 15px; padding: 40px 30px; width: 290px; position: relative; display: flex; flex-direction: column; transition: 0.3s; }
        .card.featured { border: 2px solid var(--primary-color); transform: scale(1.05); z-index: 10; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .card.enterprise { border: 2px solid var(--gold-color); }
        .badge { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: var(--primary-color); color: white; padding: 5px 18px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        
        .price { font-size: 2.5rem; font-weight: bold; margin: 20px 0; }
        .price span { font-size: 1rem; color: #666; font-weight: normal; }
        .features { list-style: none; padding: 0; margin-bottom: 30px; flex-grow: 1; }
        .features li { margin: 12px 0; display: flex; align-items: flex-start; font-size: 0.95rem; text-align: left; }
        .features li i { color: var(--secondary-color); margin-right: 10px; margin-top: 4px; }
        .setup-tag { background: #fff0f0; color: var(--accent-color); padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; margin-left: 5px; }

        .btn-wa { display: block; background: #25d366; color: white; text-decoration: none; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; transition: 0.3s; }
        .btn-wa.ent { background: var(--gold-color); }
